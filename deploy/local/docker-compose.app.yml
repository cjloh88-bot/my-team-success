services:
  app:
    container_name: my-team-success-app
    image: my-team-success:local
    build:
      context: ${APP_SOURCE_DIR}
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      OPENAI_API_KEY: ${APP_OPENAI_API_KEY:-}
      OPENAI_MODEL: ${APP_OPENAI_MODEL:-gpt-5.4-mini}
      SLACK_WEBHOOK_URL: ${APP_SLACK_WEBHOOK_URL:-}
      CRON_SECRET: ${APP_CRON_SECRET}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
